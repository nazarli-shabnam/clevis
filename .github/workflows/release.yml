name: Release (Docker Images)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build + Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.ref_name }}

      - name: Build + Push Worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-worker:latest
            ghcr.io/${{ github.repository }}-worker:${{ github.ref_name }}

      - name: Build + Push UI
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-ui:latest
            ghcr.io/${{ github.repository }}-ui:${{ github.ref_name }}

