name: clevis

# Profiles:
#   docker compose --profile backend up           → db + api + worker
#   docker compose --profile frontend up          → db + ui (point NEXT_PUBLIC_API_BASE at a running api)
#   docker compose --profile backend --profile frontend up  → full stack
#   docker compose up db                          → db only (for running services locally)

services:
  db:
    container_name: db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: clevis
      POSTGRES_USER: clevis
      POSTGRES_PASSWORD: clevis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clevis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clevis

  api:
    container_name: api
    profiles: ["backend"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://clevis:clevis@db:5432/clevis
    volumes:
      - ../packages/checks:/app/packages/checks
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - clevis

  worker:
    container_name: worker
    profiles: ["backend"]
    build:
      context: ../apps/worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://clevis:clevis@db:5432/clevis
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clevis

  ui:
    container_name: ui
    profiles: ["frontend"]
    build:
      context: ../apps/ui
    env_file:
      - ../.env
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
        required: false
    restart: unless-stopped
    networks:
      - clevis

networks:
  clevis:
    driver: bridge

volumes:
  pgdata:
